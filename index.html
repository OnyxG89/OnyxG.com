<!DOCTYPE html>

<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ONYX G INK</title>

<style>

/* BODY */

body{
margin:0;
font-family:Arial;
color:white;

background-image:url("studio2.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* HERO VIDEO */

.hero{
position:relative;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* LOGO */

.logo{

font-size:110px;
font-weight:900;
letter-spacing:8px;

background:linear-gradient(45deg,#ffffff,#bbbbbb,#ffffff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 10px 30px rgba(0,0,0,0.9),
0 20px 60px rgba(0,0,0,0.8);

}

/* TAGLINE */

.tagline{
font-size:22px;
letter-spacing:4px;
margin-top:10px;
}

/* SECTIONS */

section{

background:rgba(0,0,0,0.75);

margin:40px;
padding:40px;

border-radius:12px;

text-align:center;

}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* IMAGES */

.gallery img{

width:100%;
border-radius:10px;
cursor:pointer;

transition:0.4s;
}

.gallery img:hover{

transform:scale(1.08);

box-shadow:0 15px 40px rgba(0,0,0,0.8);

}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

/* VIDEOS */

video{
width:340px;
margin:15px;
border-radius:10px;
}

/* STUDIO */

.studio img{
height:300px;
object-fit:cover;
border-radius:10px;
}

/* CEO */

.ceo img{
width:260px;
border-radius:10px;
}

/* WHATSAPP */

.whatsapp{

position:fixed;
bottom:20px;
right:20px;

background:#25D366;
color:white;

padding:16px 28px;

border-radius:40px;

text-decoration:none;

font-weight:bold;

box-shadow:0 10px 30px rgba(0,0,0,0.6);

}

</style>

</head>

<body>

<script>

const gallery=document.querySelectorAll(".gallery img");
const lightbox=document.getElementById("lightbox");
const lightboxImg=lightbox.querySelector("img");

gallery.forEach(img=>{
img.onclick=()=>{
lightbox.style.display="flex";
lightboxImg.src=img.src;
}
})

lightbox.onclick=()=>{
lightbox.style.display="none";
}

</script>

</html>
